name: Backend CI

on:
  push:
    branches: [master, main]
    paths:
      - 'python/**'
      - '.github/workflows/backend-ci.yml'
      - 'docker-compose.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'python/**'
      - '.github/workflows/backend-ci.yml'
      - 'docker-compose.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: futures
          POSTGRES_PASSWORD: futures123
          POSTGRES_DB: futures_community
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 15432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            ./python/requirements.txt
            ./python/requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install pytest-cov

      - name: Run Alembic migrations
        env:
          SECRET_KEY: test-secret-key-for-ci-local-development-42
          DATABASE_URL: postgresql://futures:futures123@localhost:15432/futures_community
        run: |
          alembic upgrade head

      - name: Run tests with coverage
        env:
          SECRET_KEY: test-secret-key-for-ci-local-development-42
          ENABLE_SCHEDULER: "0"
          SSE_TEST_MODE: "1"
          DATABASE_URL: postgresql://futures:futures123@localhost:15432/futures_community
        run: pytest tests -q --tb=short --cov=. --cov-report=term-missing --cov-fail-under=30

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Security audit with pip-audit
        # 基于 requirements.lock（精确版本）执行依赖漏洞扫描。
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock --no-deps --disable-pip
