name: Backend CI

on:
  push:
    branches: [master, main]
    paths:
      - 'python/**'
      - '.github/workflows/backend-ci.yml'
      - 'docker-compose.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'python/**'
      - '.github/workflows/backend-ci.yml'
      - 'docker-compose.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: futures
          POSTGRES_PASSWORD: futures123
          POSTGRES_DB: futures_community
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 15432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            ./python/requirements.txt
            ./python/requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install pytest-cov

      - name: Verify direct dependencies are locked
        run: |
          python - <<'PY'
          from pathlib import Path
          from packaging.requirements import Requirement

          direct = {
              Requirement(line.strip()).name.lower().replace("_", "-")
              for line in Path("requirements.txt").read_text(encoding="utf-8").splitlines()
              if line.strip() and not line.lstrip().startswith("#")
          }
          locked = {
              Requirement(line.strip()).name.lower().replace("_", "-")
              for line in Path("requirements.lock").read_text(encoding="utf-8").splitlines()
              if line.strip() and not line.startswith((" ", "#"))
          }
          missing = sorted(direct - locked)
          if missing:
              raise SystemExit(f"Direct dependencies missing from requirements.lock: {missing}")
          print(f"Verified {len(direct)} direct dependencies are present in requirements.lock")
          PY

      - name: Run Alembic migrations
        env:
          SECRET_KEY: test-secret-key-for-ci-local-development-42
          DATABASE_URL: postgresql://futures:futures123@localhost:15432/futures_community
        run: |
          alembic upgrade head

      - name: Run tests with coverage
        env:
          SECRET_KEY: test-secret-key-for-ci-local-development-42
          ENABLE_SCHEDULER: "0"
          SSE_TEST_MODE: "1"
          DATABASE_URL: postgresql://futures:futures123@localhost:15432/futures_community
        run: pytest tests -q --tb=short --cov=. --cov-report=term-missing --cov-fail-under=40

      - name: PostgreSQL API smoke
        env:
          SECRET_KEY: test-secret-key-for-ci-local-development-42
          ENABLE_SCHEDULER: "0"
          ENV: development
          CORS_ORIGINS: http://127.0.0.1:3200
          DATABASE_URL: postgresql://futures:futures123@localhost:15432/futures_community
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from main import app

          with TestClient(app) as client:
              ready = client.get("/health/ready")
              assert ready.status_code == 200, ready.text
              login = client.post(
                  "/api/auth/login",
                  data={"username": "trader001", "password": "password123"},
              )
              assert login.status_code == 200, login.text
              token = login.json()["access_token"]
              varieties = client.get(
                  "/api/varieties",
                  headers={"Authorization": f"Bearer {token}"},
              )
              assert varieties.status_code == 200, varieties.text
              assert varieties.json(), "PostgreSQL API smoke returned no varieties"
          PY

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Security audit with pip-audit
        # 基于 requirements.lock（精确版本）执行依赖漏洞扫描。
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock --no-deps --disable-pip
