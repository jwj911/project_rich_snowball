name: Backend CI

on:
  push:
    branches: [master, main]
    paths:
      - 'python/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'python/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            ./python/requirements.txt
            ./python/requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci-local-development-42
          ENABLE_SCHEDULER: "0"
          SSE_TEST_MODE: "1"
        run: pytest tests -q --tb=short

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        # 当前代码库存在历史 lint 债务（~500 条风格警告），
        # 此步骤暂设为 continue-on-error，避免阻塞测试流程。
        # Step 1 的核心目标是确保测试可信；lint 债务将在后续迭代中逐步清理。
        continue-on-error: true
        run: ruff check .

      - name: Security audit with pip-audit
        # 基于 requirements.lock（精确版本）执行依赖漏洞扫描。
        run: |
          pip install pip-audit
          pip-audit -r requirements.lock --no-deps --disable-pip
