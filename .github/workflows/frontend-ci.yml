name: Frontend CI

on:
  push:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8401

  e2e-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: futures
          POSTGRES_PASSWORD: futures123
          POSTGRES_DB: futures_community
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 15432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ./python/requirements.lock

      - name: Install backend dependencies
        working-directory: ./python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Prepare PostgreSQL schema
        working-directory: ./python
        env:
          SECRET_KEY: e2e-secret-key-for-ci-local-development-42
          DATABASE_URL: postgresql://futures:futures123@localhost:15432/futures_community
        run: alembic upgrade head

      - name: Start backend
        working-directory: ./python
        env:
          SECRET_KEY: e2e-secret-key-for-ci-local-development-42
          DATABASE_URL: postgresql://futures:futures123@localhost:15432/futures_community
          ENV: development
          ENABLE_SCHEDULER: "0"
          CORS_ORIGINS: http://127.0.0.1:3200
          HOST: 127.0.0.1
          PORT: 8401
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8401 > ../backend-e2e.log 2> ../backend-e2e.err &
          for i in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8401/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../backend-e2e.log
          cat ../backend-e2e.err
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8401
        run: npx playwright test

      - name: Test
        run: npm run test

      - name: Lighthouse Baseline
        run: |
          npm run build
          npm start &
          sleep 5
          npm run lighthouse -- http://127.0.0.1:3000
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8401
