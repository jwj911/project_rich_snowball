name: Frontend CI

on:
  push:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8401

  e2e-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: futures
          POSTGRES_PASSWORD: futures123
          POSTGRES_DB: futures_community
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 15432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ./python/requirements.lock

      - name: Install backend dependencies
        working-directory: ./python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Prepare PostgreSQL schema
        working-directory: ./python
        env:
          SECRET_KEY: e2e-secret-key-for-ci-local-development-42
          DATABASE_URL: postgresql://futures:futures123@localhost:15432/futures_community
        run: |
          set -o pipefail
          if ! alembic upgrade head 2>&1 | tee alembic-migration.log; then
            summary="$(tail -n 30 alembic-migration.log | tr '\n' ' ' | cut -c1-3000)"
            echo "::error title=E2E Alembic migration failed::${summary}"
            exit 1
          fi

      - name: Upload E2E Alembic failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-alembic-migration-log
          path: python/alembic-migration.log
          if-no-files-found: ignore

      - name: Start backend
        working-directory: ./python
        env:
          SECRET_KEY: e2e-secret-key-for-ci-local-development-42
          DATABASE_URL: postgresql://futures:futures123@localhost:15432/futures_community
          ENV: development
          ENABLE_SCHEDULER: "0"
          CORS_ORIGINS: http://127.0.0.1:3200
          HOST: 127.0.0.1
          PORT: 8401
        run: |
          nohup python -m uvicorn main:app --host 127.0.0.1 --port 8401 > ../backend-e2e.log 2> ../backend-e2e.err &
          for i in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8401/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../backend-e2e.log
          cat ../backend-e2e.err
          exit 1

      - name: Prepare E2E admin user
        working-directory: ./python
        env:
          SECRET_KEY: e2e-secret-key-for-ci-local-development-42
          DATABASE_URL: postgresql://futures:futures123@localhost:15432/futures_community
        run: |
          python - <<'PY'
          from models import SessionLocal, UserDB

          db = SessionLocal()
          try:
              user = db.query(UserDB).filter(UserDB.username == "trader001").one()
              user.role = "admin"
              db.commit()
          finally:
              db.close()
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend for E2E
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8401
        run: npm run build

      - name: Start frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8401
        run: |
          nohup npm start -- -H 127.0.0.1 -p 3200 > ../frontend-e2e.log 2> ../frontend-e2e.err &
          for i in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:3200/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat ../frontend-e2e.log
          cat ../frontend-e2e.err
          exit 1

      - name: Upload frontend E2E startup logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-startup-log
          path: |
            frontend-e2e.log
            frontend-e2e.err
          if-no-files-found: ignore

      - name: Install Chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8401
          E2E_EXTERNAL_SERVER: "1"
        run: |
          set -o pipefail
          if ! npx playwright test 2>&1 | tee playwright-ci.log; then
            summary="$(tail -n 80 playwright-ci.log | tr '\n' ' ' | cut -c1-5000)"
            echo "::error title=Playwright smoke failed::${summary}"
            exit 1
          fi

      - name: Upload Playwright failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-playwright-log
          path: frontend/playwright-ci.log
          if-no-files-found: ignore

      - name: Test
        working-directory: ./frontend
        run: |
          set -o pipefail
          if ! npm run test -- --reporter=dot 2>&1 | tee frontend-vitest-ci.log; then
            summary="$(tail -n 80 frontend-vitest-ci.log | tr '\n' ' ' | cut -c1-5000)"
            echo "::error title=Frontend Vitest failed::${summary}"
            exit 1
          fi

      - name: Upload frontend Vitest failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-vitest-log
          path: frontend/frontend-vitest-ci.log
          if-no-files-found: ignore

      - name: Lighthouse Baseline
        working-directory: ./frontend
        run: |
          npm run build
          npm start &
          sleep 5
          npm run lighthouse -- http://127.0.0.1:3000
        env:
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8401
