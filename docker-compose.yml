version: "3.8"

services:
  # PostgreSQL 数据库（推荐用于生产/多用户场景）
  postgres:
    image: postgres:16-alpine
    container_name: futures_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: futures
      POSTGRES_PASSWORD: futures123
      POSTGRES_DB: futures_community
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futures -d futures_community"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存（可选，用于实时行情缓存、会话存储）
  redis:
    image: redis:7-alpine
    container_name: futures_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # FastAPI 后端服务
  backend:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: futures_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://futures:futures123@postgres:5432/futures_community
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENV=production
      - ENABLE_SCHEDULER=1
      - HOST=0.0.0.0
      - PORT=8401
    ports:
      - "8401:8401"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8401/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
